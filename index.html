<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISTPlay - Portal Educativo Gamificado</title>
  
  <!-- Google Fonts: Lato -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: 'var(--bg)',
            surface: 'var(--surface)',
            fg: 'var(--fg)',
            muted: 'var(--muted)',
            border: 'var(--border)',
            accent: 'var(--accent)',
          },
          fontFamily: {
            sans: ['Lato', 'sans-serif'],
            display: ['Lato', 'sans-serif'],
            mono: ['ui-monospace', 'monospace'],
          },
          animation: {
            'appear': 'appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'appear-zoom': 'appear-zoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 1.5s infinite linear',
          },
          keyframes: {
            appear: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'appear-zoom': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  
  <!-- Global Styles -->
  <style>
    :root {
      /* Tema claro por defecto */
      --bg: #ffffff;
      --surface: #f7f9fc;
      --fg: #1a1a24;
      --muted: #666677;
      --border: #e0e0ea;
      --accent: #cb348c; /* Magenta */
    }
    
    html.dark {
      /* Tema oscuro */
      --bg: #1e2021; /* Gris Dark Reader */
      --surface: #212324; /* Gris oscuro para superficies */
      --fg: #ffffff;
      --muted: #a1a8ab; /* Gris suave */
      --border: #363a3c; /* Borde sutil */
      --accent: #cb348c; /* Cyan (mantenido) */
    }
    
    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Lato', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass-panel {
      background: rgba(247, 249, 252, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    
    html.dark .glass-panel {
      background: rgba(79, 11, 123, 0.7);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, var(--accent), #8b5cf6, #35bad1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    // Lucide React UMD expects lowercase 'react' global
    window.react = window.React;
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const { ChevronRight, Star, Play, Award, Zap, BookOpen, FlaskConical, Trophy, User, ArrowRight, CheckCircle2, XCircle, Gamepad2, Brain, Compass, Users, Sparkles, Code, Globe, Shield, HeartPulse, Building2, Activity, ShieldAlert, Wrench, Sun, Moon } = window.LucideReact;

    // --- MOCK DATA ---
    const MOCK_USER = {

      level: 12,

      { id: "g3", title: "🏗️ 360 VR Alimentación", subject: "Maquinaria", level: "Todo público", duration: "7 min", points: 130, color: "from-green-500 to-emerald-400", bg: "bg-green-500/10", icon: Shield, url: "https://tour.panoee.net/preview?tour=696e8b96cb1262ed5e775a57&scene=696e8bab53181e56c2e9e74f" },
      { id: "g4", title: "🚶‍♂️ Señaleticas de Seguridad", subject: "Transporte", level: "Todo público", duration: "15 min", points: 160, color: "from-indigo-500 to-violet-400", bg: "bg-indigo-500/10", icon: Compass, url: "https://caminata-istgames.netlify.app" },
      { id: "g5", title: "🥽 VR Construcción", subject: "Construcción", level: "Todo público", duration: "5 min", points: 100, color: "from-orange-500 to-yellow-400", bg: "bg-orange-500/10", icon: Building2, url: "VR360/vr.html" },
      { id: "g6", title: "☢️ Rayos X Ergonómicos", subject: "Salud", level: "Todo público", duration: "8 min", points: 110, color: "from-red-500 to-rose-400", bg: "bg-red-500/10", icon: Activity, url: "rayosx/rayosx.html" },

      { id: "g8", title: "🎒 Kit de Emergencia Familiar", subject: "Salud", level: "Todo público", duration: "15 min", points: 180, color: "from-indigo-500 to-violet-400", bg: "bg-indigo-500/10", icon: HeartPulse, url: "https://grd-istgames.netlify.app/" }
    ];

    // --- REUSABLE COMPONENTS ---
    const Button = ({ children, variant = 'primary', size = 'md', className = '', onClick, ...props }) => {
      const base = "inline-flex items-center justify-center rounded-xl font-bold transition-all duration-300 relative overflow-hidden group border";
      const variants = {
        primary: "bg-accent border-transparent text-white shadow-[0_4px_15px_rgba(203,52,140,0.25)] dark:shadow-[0_4px_15px_rgba(53,186,209,0.25)] hover:-translate-y-0.5 hover:shadow-[0_6px_20px_rgba(203,52,140,0.35)] dark:hover:shadow-[0_6px_20px_rgba(53,186,209,0.35)]",
        secondary: "bg-surface text-fg border-border hover:bg-bg shadow-sm hover:-translate-y-0.5",
        ghost: "bg-transparent border-transparent text-muted hover:bg-surface hover:text-fg",
        glow: "bg-fg text-bg border-border shadow-[0_0_30px_rgba(var(--accent),0.3)] hover:-translate-y-0.5"
      };
      const sizes = { sm: "px-4 py-2 text-sm", md: "px-6 py-3 text-base", lg: "px-8 py-4 text-lg" };
      
      return (
        <motion.button 
          whileTap={{ scale: 0.95 }}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} 
          onClick={onClick}
          {...props}
        >
          {variant === 'primary' && <span className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]" />}
          <span className="relative flex items-center justify-center gap-2">{children}</span>
        </motion.button>
      );
    };

    const Badge = ({ children, className = '' }) => (
      <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${className}`}>
        {children}
      </span>
    );

    const PremiumGameCard = ({ title, subject, level, duration, points, color, bg, icon: Icon, onClick }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);

      const mouseXSpring = useSpring(x);
      const mouseYSpring = useSpring(y);

      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["7.5deg", "-7.5deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-7.5deg", "7.5deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
      };

      return (
        <motion.div
          style={{ rotateX, rotateY, transformStyle: "preserve-3d" }}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          onClick={onClick}
          className={`relative w-full rounded-2xl p-0.5 cursor-pointer group bg-gradient-to-b from-border to-surface border border-border shadow-sm hover:shadow-2xl transition-shadow duration-500`}
        >

          <div className="relative bg-surface rounded-[14px] p-6 h-full flex flex-col z-10 overflow-hidden">

            <div className="flex justify-between items-start mb-6 relative z-20" style={{ transform: "translateZ(30px)" }}>

              </Badge>
              <Badge className="bg-bg text-accent border border-border shadow-sm font-black">
                <Star size={14} fill="currentColor" /> {points}
              </Badge>
            </div>
            
            <div className="flex-grow relative z-20" style={{ transform: "translateZ(40px)" }}>
              <h3 className="text-2xl font-bold text-fg mb-3 group-hover:text-accent transition-colors">{title}</h3>
              <div className="flex items-center gap-4 text-sm text-muted font-medium">
                <span className="flex items-center gap-1.5"><User size={16}/> Lvl {level}</span>
                <span className="flex items-center gap-1.5"><Play size={16}/> {duration}</span>
              </div>
            </div>
            
            <div className="mt-8 flex items-center justify-between relative z-20" style={{ transform: "translateZ(20px)" }}>
              <div className="flex -space-x-3">
                {[1,2,3].map(i => (
                  <img key={i} src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${i+title}&backgroundColor=e2e8f0`} className="w-10 h-10 rounded-full border-2 border-surface shadow-sm" alt="player" />
                ))}
              </div>
              <div className="w-12 h-12 rounded-full bg-bg text-fg flex items-center justify-center border border-border group-hover:bg-accent group-hover:text-white group-hover:scale-110 transition-all duration-300 shadow-md">
                <Play size={20} fill="currentColor" className="ml-1"/>
              </div>
            </div>
          </div>
        </motion.div>
      );
    };

    // --- VIEWS ---
    const Landing = ({ onNavigate }) => (
      <div className="min-h-screen pt-20">
        <section className="relative overflow-hidden px-4 sm:px-6 lg:px-8 py-20 lg:py-32 max-w-7xl mx-auto flex flex-col items-center text-center">
          
          {/* Animated Background Elements */}

          <motion.div animate={{ y: [0, -20, 0], rotate: [0, 5, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute top-20 left-10 lg:left-20 w-16 h-16 bg-surface border border-border rounded-xl rotate-12 blur-[0.5px] -z-10 flex items-center justify-center text-accent"><Gamepad2 size={32}/></motion.div>
          <motion.div animate={{ y: [0, 30, 0], rotate: [0, -10, 0] }} transition={{ duration: 8, repeat: Infinity }} className="absolute bottom-40 right-10 lg:right-32 w-24 h-24 bg-surface border border-border rounded-full blur-[0.5px] -z-10 flex items-center justify-center text-accent"><Star size={40} fill="currentColor"/></motion.div>
          <motion.div animate={{ y: [0, -15, 0], x: [0, 15, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute top-40 right-20 w-12 h-12 bg-surface border border-border rounded-full blur-[0.5px] -z-10 flex items-center justify-center text-purple-500"><Brain size={24}/></motion.div>

          <div className="flex flex-col items-center gap-6 sm:gap-8 z-10 w-full">

            <motion.p initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay: 0.2 }} className="text-lg sm:text-xl text-muted max-w-2xl font-medium leading-relaxed">

            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay: 0.3 }} className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto mt-4">
              <Button size="lg" onClick={() => onNavigate('catalog')} className="w-full sm:w-auto text-lg px-8">Explorar Juegos <ArrowRight size={20}/></Button>
              <Button variant="secondary" size="lg" onClick={() => onNavigate('dashboard')} className="w-full sm:w-auto text-lg px-8">Ver Dashboard</Button>
            </motion.div>
          </div>

          <motion.div initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.5 }} className="w-full max-w-5xl mt-20 relative">
            <div className="absolute inset-0 bg-gradient-to-t from-bg via-transparent to-transparent z-20 h-full w-full pointer-events-none rounded-t-2xl" />
            <div className="glass-panel p-2 rounded-2xl shadow-2xl relative z-10">
              <div className="bg-bg rounded-xl overflow-hidden border border-border shadow-inner flex flex-col">
                {/* Fake Browser Chrome */}
                <div className="bg-surface border-b border-border px-4 py-3 flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full bg-red-400"></div>

        </section>

        {/* Benefits Section */}
        <section className="py-24 bg-surface border-y border-border px-6 lg:px-8 relative overflow-hidden">
          <div className="max-w-7xl mx-auto">
            <div className="text-center mb-20">
              <h2 className="text-4xl lg:text-5xl font-bold mb-6">Aprendizaje que <span className="text-accent">engancha.</span></h2>
              <p className="text-muted max-w-2xl mx-auto text-xl">Diseñado con principios de ciencias cognitivas para mantener la motivación al máximo nivel.</p>
            </div>
            <div className="grid md:grid-cols-3 gap-8">

              <div className="hidden md:flex items-center gap-2">
                {navs.map(nav => (
                  <button key={nav.id} onClick={() => onNavigate(nav.id)} className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all ${currentView === nav.id ? 'bg-accent text-white shadow-md' : 'text-muted hover:text-fg hover:bg-surface/80'}`}>
                    {nav.label}
                  </button>
                ))}
              </div>
              
              <div className="flex items-center gap-4">
                <div className="hidden lg:flex items-center gap-2">
                  <button className="text-sm font-bold text-muted hover:text-fg transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('parents')}>Padres</button>
                  <button className="text-sm font-bold text-muted hover:text-fg transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('profile')}>Perfil</button>
                </div>
                
                {/* Theme Switch */}
                <button 
                  onClick={toggleTheme} 
                  className="w-10 h-10 rounded-full flex items-center justify-center border border-border text-fg hover:bg-surface transition-colors"
                  aria-label="Cambiar tema"
                >
                  {theme === 'dark' ? <Sun size={20} /> : <Moon size={20} />}
                </button>

                <Button size="md" className="rounded-full px-8" onClick={() => onNavigate('catalog')}>Jugar Ahora</Button>
              </div>
            </div>
          </div>
        </nav>
      );
    };

    const App = () => {
      const [view, setView] = useState('landing');
      const [params, setParams] = useState({});
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');

      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => prev === 'light' ? 'dark' : 'light');
      };

      const navigate = (newView, newParams = {}) => {
        setParams(newParams);
        setView(newView);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const views = {
        landing: <Landing onNavigate={navigate} />,
        catalog: <Catalog onNavigate={navigate} />,
        dashboard: <Dashboard onNavigate={navigate} />,
        game: <EmbedGame onNavigate={navigate} gameId={params.gameId} />,
        parents: <ParentsPanel onNavigate={navigate} />,
        profile: <ProfilePanel onNavigate={navigate} />
      };

      return (
        <div className="w-full min-h-screen relative font-sans bg-bg text-fg selection:bg-accent/20">
          <Navbar currentView={view} onNavigate={navigate} theme={theme} toggleTheme={toggleTheme} />
          <AnimatePresence mode="wait">
            <motion.div key={view} initial={{ opacity: 0, filter: 'blur(10px)' }} animate={{ opacity: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, filter: 'blur(10px)' }} transition={{ duration: 0.4 }}>
              {views[view]}
            </motion.div>
          </AnimatePresence>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
